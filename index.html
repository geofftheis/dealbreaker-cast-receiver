<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal/Breaker - Cast Receiver</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Cast Receiver SDK -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
    <div id="app">
        <!-- Connecting screen (default) -->
        <div id="connecting-screen" class="screen active">
            <img src="dealbreaker_logo.png" alt="Deal/Breaker" class="logo-image connecting-logo">
            <div class="status">Connecting...</div>
        </div>

        <!-- Lobby screen -->
        <div id="lobby-screen" class="screen">
            <div class="lobby-container">
                <!-- Left column: Logo and access code -->
                <div class="lobby-left-column">
                    <img src="dealbreaker_logo.png" alt="Deal/Breaker" class="logo-image">
                    <div class="header">
                        <div class="access-code-label">Access Code:</div>
                        <div class="access-code"></div>
                    </div>
                    <div class="game-settings">
                        <span class="player-count"></span>
                    </div>
                    <div class="waiting-message">Waiting for host to start...</div>
                </div>
                <!-- Right column: Players list -->
                <div class="lobby-right-column">
                    <div class="players-header">Players</div>
                    <div class="player-list"></div>
                </div>
            </div>
        </div>

        <!-- Loading screen -->
        <div id="loading-screen" class="screen">
            <img src="dealbreaker_logo.png" alt="Deal/Breaker" class="logo-image">
            <div class="loader"></div>
            <div class="status">Loading Game...</div>
        </div>

        <!-- Round countdown screen -->
        <div id="countdown-screen" class="screen">
            <div class="round-label">Round <span class="round-number">1</span></div>
            <div class="round-category"></div>
            <div class="countdown-circle">
                <span class="countdown-number">3</span>
            </div>
            <div class="round-progress">of <span class="total-rounds">6</span> rounds</div>
        </div>

        <!-- Answering screen (no timer in Deal/Breaker) -->
        <div id="answering-screen" class="screen">
            <div class="phase-label">Round <span class="round-number">1</span></div>
            <div class="answer-heading">Choosing Dates</div>
            <div class="answer-count"><span class="answers-received">0</span> / <span class="total-players">8</span></div>
            <div class="answer-status">players have picked</div>
        </div>

        <!-- Round intro: the per-round reveal animation (photo / new characteristic), mirrors the phones -->
        <div id="round-intro-screen" class="screen">
            <div class="intro-content">
                <div class="intro-category"></div>
                <div class="intro-label"></div>
                <div class="intro-card">
                    <div class="intro-photo-holder"></div>
                    <div class="intro-name"></div>
                </div>
                <div class="intro-char"></div>
            </div>
        </div>

        <!-- Reveal screen — 3 candidates across the top, picks drop in one-by-one -->
        <div id="reveal-screen" class="screen">
            <div class="reveal-header">Who Picked Who?</div>
            <div class="reveal-candidates"></div>
        </div>

        <!-- Round results screen -->
        <div id="round-results-screen" class="screen">
            <div class="results-header">
                <div class="round-label">Round <span class="round-number">1</span> Results</div>
            </div>
            <div class="scores-header-container">
                <span class="scores-header-text round-scores-text">Round Scores</span>
                <span class="scores-header-text current-standings-text">Current Standings</span>
            </div>
            <div class="leaderboard"></div>
        </div>

        <!-- Game results screen -->
        <div id="game-results-screen" class="screen">
            <div class="game-results-container">
                <div class="game-results-header">Final Results</div>
                <div class="leaderboard"></div>
            </div>
        </div>

        <!-- End screen -->
        <div id="end-screen" class="screen">
            <img src="dealbreaker_logo.png" alt="Deal/Breaker" class="logo-image">
            <div class="status">Thanks for playing!</div>
        </div>
    </div>

    <!-- Single audio element for all sounds (lobby music + SFX) -->
    <!-- Chromecast only outputs from one audio element -->
    <audio id="game-audio" src="lobby_music.m4a" preload="auto" loop></audio>

    <script src="receiver.js"></script>
</body>
</html>
